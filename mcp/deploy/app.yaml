# Databricks Apps deployment config for geeViz MCP Server
# Deploy: databricks apps deploy geeviz-mcp --source-code-path .
name: geeviz-mcp
description: geeViz MCP Server — Earth Engine geospatial tools for AI assistants

command:
  - python
  - -m
  - geeViz.mcp.server
  - --sandbox

env:
  - name: MCP_TRANSPORT
    value: streamable-http
  - name: MCP_HOST
    value: "0.0.0.0"
  - name: MCP_PORT
    value: "8080"
  - name: MCP_PATH
    value: /mcp
  # Set these for your GEE service account:
  # - name: GEE_PROJECT
  #   value: your-gee-project-id
  # - name: GEE_SERVICE_ACCOUNT_KEY
  #   value: /dbfs/secrets/ee-sa-key.json
